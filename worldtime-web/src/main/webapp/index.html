<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>세계 시간 선택</title>
</head>
<body>
    <h2>🕒 세계 시간 조회</h2>
    <form action="worldtime" method="GET">
        <label for="locale">로케일 선택:</label>
        <select name="locale" id="locale">
            <option value="ko_KR">한국어 (ko_KR)</option>
            <option value="en_US">영어 (en_US)</option>
            <option value="ja_JP">일본어 (ja_JP)</option>
        </select>
        <br><br>
        
        <label for="timezone">타임존 선택:</label>
        <select name="timezone" id="timezone">
            <option value="Asia/Seoul">서울 (Asia/Seoul)</option>
            <option value="America/New_York">뉴욕 (America/New_York)</option>
            <option value="Europe/London">런던 (Europe/London)</option>
        </select>
        <br><br>
        
        <button type="submit">조회하기</button>
    </form>
</body>
</html>
